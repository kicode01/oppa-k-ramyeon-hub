<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Oppa K-Ramyeon Hub</title>
    <link rel="stylesheet" href="css/styles.css?v=5">
    <style>
        .auth-container {
            max-width: 420px;
            width: 90%;
            margin: 120px auto 80px;
            background: var(--bg-panel);
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid rgba(232, 179, 35, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(232, 179, 35, 0.1);
        }
        @media (max-width: 768px) {
            .auth-container {
                padding: 35px 25px;
                margin: 80px auto;
            }
        }
        .auth-container h2 {
            text-align: center;
            color: var(--accent-yellow);
            margin-bottom: 35px;
            font-size: 2rem;
            letter-spacing: 0.5px;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: white !important;
            padding: 14px 16px !important;
            border-radius: 10px !important;
            transition: all 0.3s ease !important;
        }
        .form-control:focus {
            border-color: var(--accent-yellow) !important;
            box-shadow: 0 0 15px rgba(232, 179, 35, 0.2) !important;
            background: rgba(0, 0, 0, 0.6) !important;
        }
        .error-message {
            color: var(--danger);
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        .auth-links a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .auth-links a:hover {
            color: var(--accent-yellow);
        }
    </style>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
</head>
<body>

        <header>
        <div class="container nav-container">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;"><img src="images/logo.jpg" alt="Oppa Logo" style="height: 40px; border-radius: 50%; border: 2px solid var(--accent-yellow); cursor: pointer;" onclick="window.location.href = window.location.pathname + '?bust=' + new Date().getTime();" title="Hard Refresh & Cache Bust">OPPA <span style="color:var(--text-main);">K-RAMYEON HUB</span></div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu & Build-a-Bowl</a>
                <a href="reservations.html">Reservations</a>
                <a href="passport.html">Noodle Passport</a>
                <a href="about.html">About & Contact</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="active" class="user-icon-wrapper" style="color: var(--text-main); display: flex; align-items: center; justify-content: center;" title="Login / Register">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </a>
                <div class="cart-icon-wrapper" onclick="openCart()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align: middle;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> <div class="cart-badge" style="display: none;">0</div>
                </div>
                <button class="mobile-menu-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align: middle;"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            <div id="error-msg" class="error-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="javascript:void(0)" onclick="customAlert('Forgot Password?', 'No worries! Send us a quick message on our Facebook page and we will help you reset it right away!<br><br><a href=\'https://www.facebook.com/profile.php?id=61568284540139\' target=\'_blank\' style=\'color:var(--accent-yellow); text-decoration:underline; font-weight:bold;\'>Click here to message us!</a>')" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <script src="js/main.js?v=4"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            const formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('password', password);

            if (typeof showLoading === 'function') showLoading('Authenticating...');

            try {
                const res = await fetch('api/auth_api.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'passport.html';
                    }
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                    if (typeof hideLoading === 'function') hideLoading();
                }
            } catch (err) {
                if (typeof hideLoading === 'function') hideLoading();
                errorDiv.textContent = 'Server connection error.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
