<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Oppa K-Ramyeon Hub</title>
    <link rel="stylesheet" href="css/styles.css?v=5">
    <style>
        .auth-container {
            max-width: 400px;
            width: 90%;
            margin: 100px auto;
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--accent-yellow);
            box-shadow: 0 0 20px rgba(232, 179, 35, 0.1);
        }
        @media (max-width: 768px) {
            .auth-container {
                padding: 25px;
                margin: 60px auto;
            }
        }
        .auth-container h2 {
            text-align: center;
            color: var(--accent-yellow);
            margin-bottom: 10px;
        }
        .auth-container p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .error-message {
            color: var(--danger);
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        .auth-links a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .auth-links a:hover {
            color: var(--accent-yellow);
        }
    </style>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
</head>
<body>

        <header>
        <div class="container nav-container">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;"><img src="images/logo.jpg" alt="Oppa Logo" style="height: 40px; border-radius: 50%; border: 2px solid var(--accent-yellow); cursor: pointer;" onclick="window.location.href = window.location.pathname + '?bust=' + new Date().getTime();" title="Hard Refresh & Cache Bust">OPPA <span style="color:var(--text-main);">K-RAMYEON HUB</span></div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu & Build-a-Bowl</a>
                <a href="reservations.html">Reservations</a>
                <a href="passport.html">Noodle Passport</a>
                <a href="about.html">About & Contact</a>
            </nav>
            <div class="nav-actions">
                <a href="login.html" class="user-icon-wrapper" style="color: var(--text-main); display: flex; align-items: center; justify-content: center;" title="Login / Register">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </a>
                <div class="cart-icon-wrapper" onclick="openCart()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align: middle;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> <div class="cart-badge" style="display: none;">0</div>
                </div>
                <button class="mobile-menu-btn"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align: middle;"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Create Account</h2>
            <p>Join the Oppa family to track your noodle journey and reservations!</p>
            <div id="error-msg" class="error-message"></div>
            <form id="register-form">
                <div class="form-group" style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label>First Name</label>
                        <input type="text" class="form-control" id="first_name" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Last Name</label>
                        <input type="text" class="form-control" id="last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign Up</button>
            </form>
            <div class="auth-links">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </main>

    <script src="js/main.js?v=4"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const firstName = document.getElementById('first_name').value;
            const lastName = document.getElementById('last_name').value;
            const errorDiv = document.getElementById('error-msg');

            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Passwords do not match.';
                return;
            }

            const formData = new URLSearchParams();
            formData.append('email', email);
            formData.append('password', password);
            formData.append('first_name', firstName);
            formData.append('last_name', lastName);

            try {
                const res = await fetch('api/auth_api.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = 'passport.html'; // Redirect to passport after registration
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Server connection error.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
